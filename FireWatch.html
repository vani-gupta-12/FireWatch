<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireWatch System</title>
    <style>
        body, html {
            height: 100%;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }

        body {
            background: url('fire-background.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
        }

        .container {
            z-index: 2;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            color: white;
        }

        input, select, textarea, button {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            width: 100%;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button {
            background-color: #ff5722;
            color: white;
        }

        .hidden {
            display: none;
        }

        .back-btn {
            background-color: #333;
            color: #fff;
            margin-top: 15px;
        }

    </style>
</head>
<body>

    <div class="overlay"></div>

    <!-- Signup Form -->
    <div class="container" id="signup-form">
        <h2>Sign Up</h2>
        <input type="text" placeholder="Enter Username" id="signup-username" required>
        <input type="password" placeholder="Enter Password" id="signup-password" required>
        <select id="signup-role">
            <option value="client">Client</option>
            <option value="admin">Administrator</option>
        </select>
        <button onclick="submitSignup()">Sign Up</button>
        <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
    </div>

    <!-- Login Form -->
    <div class="container hidden" id="login-form">
        <h2>Login</h2>
        <input type="text" placeholder="Username" id="login-username" required>
        <input type="password" placeholder="Password" id="login-password" required>
        <select id="login-role">
            <option value="client">Client</option>
            <option value="admin">Administrator</option>
        </select>
        <button onclick="submitLogin()">Login</button>
        <button class="back-btn" onclick="goBackToSignup()">Back</button>
    </div>

    <!-- Application Management Page -->
    <div class="container hidden" id="application-management">
        <h2>Application Management</h2>
        <button onclick="navigateTo('submit-application')">Application Submission</button>
        <button onclick="navigateTo('status-tracking')">Status Tracking</button>
        <button onclick="navigateTo('others')">Others</button>
        <button class="back-btn" onclick="goBackToLogin()">Back</button>
    </div>

    <!-- Application Submission Page -->
    <div class="container hidden" id="application-submission-page">
        <h2>Select Application Type</h2>
        <button onclick="selectApplicationType('NOC')">NOC</button>
        <button onclick="selectApplicationType('License')">License</button>
        <button onclick="selectApplicationType('Renewal')">Renewal</button>
        <button class="back-btn" onclick="goBackToApplicationManagement()">Back</button>
    </div>

    <!-- Document Upload Page -->
    <div class="container hidden" id="document-upload-page">
        <h2>Upload Document</h2>
        <input type="file" id="document-file" required>
        <button onclick="submitDocument()">Submit Document</button>
        <button class="back-btn" onclick="goBackToApplicationSubmission()">Back</button>
    </div>

    <!-- Payment Gateway Page -->
    <div class="container hidden" id="payment-gateway-page">
        <h2>Payment Gateway</h2>
        <p>Please complete the payment to finalize your application.</p>
        <button onclick="completePayment()">Proceed to Payment</button>
        <button class="back-btn" onclick="goBackToDocumentUpload()">Back</button>
    </div>

    <!-- Status Tracking Page -->
    <div class="container hidden" id="status-tracking-page">
        <h2>Application Status</h2>
        <p><strong>Status:</strong> <span id="application-status">Pending</span></p>
        <button class="back-btn" onclick="goBackToApplicationManagement()">Back</button>
    </div>

    <!-- Others (Grievance & Feedback) Page -->
    <div class="container hidden" id="others-page">
        <h2>Others</h2>
        <h3>Grievance Form</h3>
        <textarea id="grievance-description" placeholder="Enter your grievance here..."></textarea>
        <button onclick="submitGrievance()">Submit Grievance</button>
        <h3>Feedback Form</h3>
        <textarea id="feedback-description" placeholder="Share your experience with the website..."></textarea>
        <button onclick="submitFeedback()">Submit Feedback</button>
        <button class="back-btn" onclick="goBackToApplicationManagement()">Back</button>
    </div>

    <script>
        // Simulated user data storage for demonstration purposes
        let users = [];
        let problemDescription = '';
        let applicationStatus = 'Pending';

        function showLogin() {
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }

        function goBackToSignup() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
        }

        function goBackToLogin() {
            document.getElementById('application-management').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }

        function goBackToApplicationManagement() {
            document.getElementById('status-tracking-page').classList.add('hidden');
            document.getElementById('others-page').classList.add('hidden');
            document.getElementById('application-submission-page').classList.add('hidden');
            document.getElementById('document-upload-page').classList.add('hidden');
            document.getElementById('payment-gateway-page').classList.add('hidden');
            document.getElementById('application-management').classList.remove('hidden');
        }

        function goBackToApplicationSubmission() {
            document.getElementById('document-upload-page').classList.add('hidden');
            document.getElementById('application-submission-page').classList.remove('hidden');
        }

        function goBackToDocumentUpload() {
            document.getElementById('payment-gateway-page').classList.add('hidden');
            document.getElementById('document-upload-page').classList.remove('hidden');
        }

        // Submit signup
        function submitSignup() {
            const username = document.getElementById('signup-username').value;
            const password = document.getElementById('signup-password').value;
            const role = document.getElementById('signup-role').value;

            if (username && password) {
                users.push({ username, password, role });
                alert('Signup successful! Now please login.');
                showLogin();
            } else {
                alert('Please fill all fields.');
            }
        }

        // Submit login
        function submitLogin() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const role = document.getElementById('login-role').value;

            const user = users.find(user => user.username === username && user.password === password && user.role === role);

            if (user) {
                document.getElementById('login-form').classList.add('hidden');
                if (role === 'client') {
                    document.getElementById('application-management').classList.remove('hidden');
                } else if (role === 'admin') {
                    document.getElementById('director-dashboard').classList.remove('hidden');
                }
            } else {
                alert('Invalid login credentials.');
            }
        }

        // Navigate based on client action
        function navigateTo(action) {
            document.getElementById('application-management').classList.add('hidden');
            if (action === 'submit-application') {
                document.getElementById('application-submission-page').classList.remove('hidden');
            } else if (action === 'status-tracking') {
                document.getElementById('status-tracking-page').classList.remove('hidden');
                document.getElementById('application-status').textContent = applicationStatus;
            } else if (action === 'others') {
                document.getElementById('others-page').classList.remove('hidden');
            }
        }

        // Select application type and redirect to document upload
        function selectApplicationType(type) {
            alert(`${type} Application Selected`);
            document.getElementById('application-submission-page').classList.add('hidden');
            document.getElementById('document-upload-page').classList.remove('hidden');
        }

        // Document upload and redirect to payment gateway
        function submitDocument() {
            const fileInput = document.getElementById('document-file');
            if (fileInput.files.length > 0) {
                alert('Document uploaded successfully!');
                document.getElementById('document-upload-page').classList.add('hidden');
                document.getElementById('payment-gateway-page').classList.remove('hidden');
            } else {
                alert('Please select a document to upload.');
            }
        }

        // Complete payment
        function completePayment() {
            alert('you are being redirecting to the payment gateway');
            document.getElementById('payment-gateway-page').classList.add('hidden');
            document.getElementById('application-management').classList.remove('hidden');
        }

        // Submit grievance (client problem)
        function submitGrievance() {
            problemDescription = document.getElementById('grievance-description').value;
            if (problemDescription) {
                alert('Grievance submitted successfully!');
                document.getElementById('others-page').classList.add('hidden');
            } else {
                alert('Please enter a grievance.');
            }
        }

        // Submit feedback
        function submitFeedback() {
            const feedback = document.getElementById('feedback-description').value;
            if (feedback) {
                alert('Feedback submitted successfully!');
                document.getElementById('others-page').classList.add('hidden');
            } else {
                alert('Please enter feedback.');
            }
        }
    </script>

</body>
</html>
